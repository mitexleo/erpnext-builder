name: Build ERPNext Custom Image

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch: # manual trigger
    inputs:
      force_build:
        description: "Force build even if no new commits detected"
        required: false
        default: false
        type: boolean

env:
  DOCKER_IMAGE: mitexleo/syserp

permissions:
  contents: write # Allows pushing commits (update files) and reading data
  packages: write # Allows pushing Docker images if using GitHub Packages (optional)

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check_updates.outputs.changed }}
      new_version: ${{ steps.version.outputs.new_version }}
      apps_json_base64: ${{ steps.encode_apps.outputs.apps_json_base64 }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Install jq and curl
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl

      - name: Validate required files
        id: validate_files
        run: |
          if [ ! -f "apps.json" ]; then
            echo "Error: apps.json not found"
            exit 1
          fi
          CREATED_FILES=false
          if [ ! -f "REPO_VERSIONS.json" ]; then
            echo "Creating REPO_VERSIONS.json with empty object"
            echo "{}" > REPO_VERSIONS.json
            CREATED_FILES=true
          fi
          if [ ! -f "VERSION" ]; then
            echo "Creating VERSION file with initial version"
            echo "1.0.0" > VERSION
            CREATED_FILES=true
          fi
          echo "created_files=$CREATED_FILES" >> $GITHUB_OUTPUT

      - name: Commit initial files if created
        if: steps.validate_files.outputs.created_files == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add REPO_VERSIONS.json VERSION
          git commit -m "Initialize REPO_VERSIONS.json and VERSION files" || true
          git push || true

      - name: Read apps.json into repos
        id: read_apps
        run: |
          # Create repo-branch mapping from apps.json
          REPO_BRANCHES='{}'

          # Process each app from apps.json
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              REPO=$(echo "$line" | jq -r '.url' | sed -E 's|https://github.com/([^/]+/[^/]+).*|\1|')
              BRANCH=$(echo "$line" | jq -r '.branch')
              REPO_BRANCHES=$(echo "$REPO_BRANCHES" | jq --arg r "$REPO" --arg b "$BRANCH" '.[$r]=$b')
            fi
          done < <(jq -c '.[]' apps.json)

          # Add frappe/frappe with version-16 branch (not in apps.json)
          REPO_BRANCHES=$(echo "$REPO_BRANCHES" | jq '. + {"frappe/frappe": "version-16"}')

          # Extract just repo list for compatibility
          REPOS=$(echo "$REPO_BRANCHES" | jq -r 'keys[]' | tr '\n' ' ')

          echo "repos=$REPOS" >> $GITHUB_OUTPUT
          # Output repo_branches as JSON string, escaping newlines for GitHub Actions
          echo "repo_branches<<EOF" >> $GITHUB_OUTPUT
          echo "$REPO_BRANCHES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for updates
        id: check_updates
        run: |
          CHANGED=false
          CURRENT_VERSIONS=$(cat REPO_VERSIONS.json)

          # Get repo_branches from workflow output
          REPO_BRANCHES='${{ steps.read_apps.outputs.repo_branches }}'

          # Iterate through each repo and its branch
          for repo in $(echo "$REPO_BRANCHES" | jq -r 'keys[]'); do
            BRANCH=$(echo "$REPO_BRANCHES" | jq -r --arg r "$repo" '.[$r]')
            echo "Checking $repo branch: $BRANCH..."

            LATEST_VERSION=""
            VERSION_TYPE=""

            # Get the latest commit SHA for the specified branch only (authenticated)
            rm -f /tmp/commit_response.json
            HTTP_CODE=$(curl -s -o /tmp/commit_response.json -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$repo/commits/$BRANCH?per_page=1" 2>/dev/null || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              LATEST_SHA=$(jq -r '.sha // empty' /tmp/commit_response.json)
              if [ -n "$LATEST_SHA" ] && [ "$LATEST_SHA" != "null" ]; then
                LATEST_VERSION="$LATEST_SHA"
                VERSION_TYPE="sha"
                echo "✓ Got commit SHA for branch $BRANCH: ${LATEST_SHA:0:8}"
              else
                echo "⚠️ Empty SHA response for $repo (HTTP $HTTP_CODE)"
              fi
            elif [ "$HTTP_CODE" = "404" ]; then
              echo "⚠️ Branch $BRANCH not found for $repo (HTTP 404)"
              continue
            elif [ "$HTTP_CODE" = "403" ]; then
              echo "⚠️ Rate limited by GitHub API (HTTP 403)"
              continue
            else
              echo "⚠️ Failed to get commit for $repo (HTTP $HTTP_CODE)"
              continue
            fi

            # If we couldn't get commit SHA, skip this repo
            if [ -z "$LATEST_VERSION" ]; then
              echo "⚠️ Could not get commit SHA for $repo, skipping..."
              continue
            fi

            # Get current version from REPO_VERSIONS.json
            CURRENT_VERSION=$(echo "$CURRENT_VERSIONS" | jq -r --arg r "$repo" '.[$r] // empty')
            if [ -z "$CURRENT_VERSION" ]; then
              CURRENT_VERSION="none"
            fi

            echo "Repo: $repo"
            echo "Branch: $BRANCH"
            echo "Current version: $CURRENT_VERSION"
            echo "Latest version: $LATEST_VERSION ($VERSION_TYPE)"

            # Check if version has changed
            VERSION_CHANGED=false

            if [ "$CURRENT_VERSION" = "none" ]; then
              # First time tracking this repo
              VERSION_CHANGED=true
              echo "First time tracking $repo, will trigger build"
            elif [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
              # Simple string comparison - works for both SHA and tag
              VERSION_CHANGED=true
              echo "Version changed: $CURRENT_VERSION -> $LATEST_VERSION"
            else
              echo "No change detected"
            fi

            if [ "$VERSION_CHANGED" = "true" ]; then
              # Update to latest version
              CURRENT_VERSIONS=$(echo "$CURRENT_VERSIONS" | jq --arg r "$repo" --arg v "$LATEST_VERSION" '.[$r]=$v')
              CHANGED=true
            fi
          done

          echo "$CURRENT_VERSIONS" > REPO_VERSIONS.json

          # Check if force build is requested
          if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "Force build requested via manual trigger"
            CHANGED=true
          fi

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

          if [ "$CHANGED" = "false" ]; then
            echo "No updates detected. Build will be skipped."
          else
            echo "Updates detected or force build requested. Proceeding with build."
          fi

      - name: Increment image version
        if: steps.check_updates.outputs.changed == 'true'
        id: version
        run: |
          CURRENT_VERSION=$(cat VERSION)
          echo "Current version: $CURRENT_VERSION"
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "$NEW_VERSION" > VERSION
          if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "Version bumped to: $NEW_VERSION (force build)"
          else
            echo "Version bumped to: $NEW_VERSION"
          fi

      - name: Base64 encode apps.json
        if: steps.check_updates.outputs.changed == 'true'
        id: encode_apps
        run: |
          APPS_JSON_BASE64=$(base64 -w 0 apps.json)
          echo "apps_json_base64=$APPS_JSON_BASE64" >> $GITHUB_OUTPUT

      - name: Commit updated files
        if: steps.check_updates.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add REPO_VERSIONS.json VERSION
          if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            git commit -m "Force build: bump version to ${{ steps.version.outputs.new_version }}"
          else
            git commit -m "Update SHAs and bump version to ${{ steps.version.outputs.new_version }}"
          fi
          git push

  build-and-push:
    needs: check-updates
    if: needs.check-updates.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Pull latest changes
        run: |
          git fetch origin
          git checkout -B main origin/main 2>/dev/null || git checkout -B master origin/master 2>/dev/null || git checkout -B main main 2>/dev/null || true

      - name: Clone frappe_docker
        run: git clone https://github.com/frappe/frappe_docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Add cleanup commands to Containerfile
        run: |
          cd frappe_docker
          # Check if Containerfile exists
          if [ ! -f "images/layered/Containerfile" ]; then
            echo "Error: Containerfile not found at images/layered/Containerfile"
            exit 1
          fi

          # Remove any existing cleanup command to avoid duplication
          # Look for lines starting with RUN that contain cache cleanup commands
          sed -i '/^RUN.*rm -rf.*\.cache\/pip/d' images/layered/Containerfile
          sed -i '/^RUN.*pip cache purge/d' images/layered/Containerfile
          sed -i '/^RUN.*npm cache clean/d' images/layered/Containerfile
          sed -i '/^RUN.*yarn cache clean/d' images/layered/Containerfile

          # Create a simple, robust cleanup command
          # Use package manager commands first, then manual cleanup as fallback
          CLEANUP_COMMAND="RUN pip cache purge 2>/dev/null || true && npm cache clean --force 2>/dev/null || true && yarn cache clean 2>/dev/null || true && rm -rf /home/frappe/.cache/pip/* 2>/dev/null || true && rm -rf /home/frappe/.npm/_cacache/* 2>/dev/null || true && rm -rf /home/frappe/.cache/yarn/* 2>/dev/null || true && find /home/frappe/frappe-bench -name \"*.pyc\" -delete 2>/dev/null || true && find /home/frappe/frappe-bench -name \"__pycache__\" -type d -exec rm -rf {} + 2>/dev/null || true && find /home/frappe/frappe-bench -name \"*.map\" -delete 2>/dev/null || true"

          # Find the line before "FROM frappe/base" and insert the cleanup command
          # Use a simple approach: find the line and insert before it
          if grep -q "FROM frappe/base" images/layered/Containerfile; then
            # Insert the cleanup command before the FROM line
            sed -i "/^FROM frappe\/base/i $CLEANUP_COMMAND" images/layered/Containerfile
            echo "✅ Cleanup commands added to Containerfile"
          else
            echo "⚠️ Could not find 'FROM frappe/base' in Containerfile"
            echo "Containerfile structure:"
            head -50 images/layered/Containerfile
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        env:
          DOCKER_BUILDKIT: 1
        run: |
          cd frappe_docker
          docker buildx build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-to type=inline \
            --cache-from type=registry,ref=${{ env.DOCKER_IMAGE }}:latest \
            --build-arg=FRAPPE_PATH=https://github.com/frappe/frappe \
            --build-arg=FRAPPE_BRANCH=version-16 \
            --build-arg=APPS_JSON_BASE64=${{ needs.check-updates.outputs.apps_json_base64 }} \
            --tag=${{ env.DOCKER_IMAGE }}:${{ needs.check-updates.outputs.new_version }} \
            --tag=${{ env.DOCKER_IMAGE }}:latest \
            --file=images/layered/Containerfile \
            --load .

      - name: Push Docker image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ needs.check-updates.outputs.new_version }}
          docker push ${{ env.DOCKER_IMAGE }}:latest
